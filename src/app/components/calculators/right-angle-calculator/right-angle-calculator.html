<section class="calculator-container">
  <h2>Right-Angle Calculator</h2>
  <p class="description">Enter values for exactly two sides. Leave the side you want to solve as 0.</p>

  <div class="illustration" aria-hidden="true">
    <svg viewBox="0 0 220 160" class="triangle-svg">
      <line x1="25" y1="130" x2="185" y2="130" class="triangle-line"></line>
      <line x1="25" y1="130" x2="25" y2="25" class="triangle-line"></line>
      <line x1="25" y1="25" x2="185" y2="130" class="triangle-line hypotenuse"></line>

      <path d="M 25 130 L 25 105 L 50 105 L 50 130" class="right-angle-mark"></path>

      <text x="95" y="148" class="label">a</text>
      <text x="10" y="78" class="label">b</text>
      <text x="108" y="68" class="label">c</text>
    </svg>
  </div>

  <div class="inputs-grid">
    <label [class.solved]="solvedSide === 'a'">
      Side a
      <input type="number" [(ngModel)]="sideA" (ngModelChange)="onInputChange()" min="0" step="0.01" [class.solved]="solvedSide === 'a'" />
    </label>
    <label [class.solved]="solvedSide === 'b'">
      Side b
      <input type="number" [(ngModel)]="sideB" (ngModelChange)="onInputChange()" min="0" step="0.01" [class.solved]="solvedSide === 'b'" />
    </label>
    <label [class.solved]="solvedSide === 'c'">
      Side c (hypotenuse)
      <input type="number" [(ngModel)]="sideC" (ngModelChange)="onInputChange()" min="0" step="0.01" [class.solved]="solvedSide === 'c'" />
    </label>
  </div>

  <button type="button" class="calculate-btn" (click)="calculate()">Calculate</button>

  @if (errorMessage) {
    <p class="error" role="alert">{{ errorMessage }}</p>
  }

  @if (result !== null) {
    <div class="result-box" aria-live="polite">
      <p>
        Solved side <strong>{{ solvedSide }}</strong>: <strong>{{ result.toFixed(4) }}</strong>
      </p>
      <p class="formula">{{ solvedFormula }}</p>
    </div>
  }
</section>
